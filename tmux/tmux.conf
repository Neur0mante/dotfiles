##### =======================================================
##### BASIC / GLOBAL SETTINGS
##### =======================================================

# Fallback prefix (kept on purpose)
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# Make Alt (Meta) bindings reliable
set -s escape-time 0
set -g xterm-keys on

# Large scrollback (servers, logs)
set -g history-limit 100000

# Vim-style keys in copy mode
setw -g mode-keys vi

# Human-friendly numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


set -g default-shell /usr/bin/zsh
set -gu default-command


##### =======================================================
##### CHEATSHEET (SOURCE OF TRUTH)
##### =======================================================

# @cheatsheet_start
# TMUX ALT-BASED CHEATSHEET
# =========================
#
# PREFIX
# Ctrl + b        tmux prefix (fallback)
#
# PANES
# Alt + W/A/S/D   move between panes
# Alt + Shift + WASD resize panes
# Alt + F         split vertically
# Alt + G         split horizontally
# Alt + P         pane ? new window
# Alt + O         pane ? existing window
# Alt + Z         zoom pane
# Alt + X         kill pane
#
# WINDOWS
# Alt + Q / E     previous / next window
# Alt + R         new window
# Alt + &         kill window
#
# SESSIONS
# Alt + T           new session
# Alt + Shift + T   list sessions
# Alt + Shift + Q/E previous / next session
# Alt + Shift + X   kill session (safe)
#
# COPY / CLIPBOARD
# Alt + C         copy mode
# Alt + V         paste
# Alt + B         clipboard history
#
# HELP
# Alt + H         view this cheatsheet
# Alt + Shift + H closes this cheatsheet
# @cheatsheet_end


##### =======================================================
##### HELP / CHEATSHEET
##### - Alt+h        => open help pane (idempotent per window)
##### - Alt+Shift+H  => close help pane for current window
##### - pane-died    => clear stale per-window state
##### =======================================================

# Optional: regenerate cheatsheet whenever tmux loads/reloads config
run-shell "~/.tmux/generate-cheatsheet.sh"


##### HELP PANE OPEN (Alt + h) #####

bind -n M-u run-shell '
  current_window="$(tmux display-message -p "##{window_id}")"
  current_pane="$(tmux display-message -p "##{pane_id}")"
  help_pane="$(tmux show-options -w -v -q -t "$current_window" @help_pane)"

  # If this window already has a live help pane, do nothing
  if [ -n "$help_pane" ] && tmux list-panes -a -F "##{pane_id}" | grep -qx "$help_pane"; then
    exit 0
  fi

  # If the stored pane id is stale, clear it
  if [ -n "$help_pane" ]; then
    tmux set-option -w -u -t "$current_window" @help_pane
  fi

  # Create help pane and capture its pane id
  new_pane="$(
    tmux split-window -h -l 40 -P -F "##{pane_id}" \
      "less -R --no-init ~/.tmux/cheatsheet.txt" \
      | tr -d "\r\n"
  )"

  # Store help pane id on this window only
  tmux set-option -w -t "$current_window" @help_pane "$new_pane"

  # Keep focus on the pane you were working in
  tmux select-pane -t "$current_pane"
'


##### HELP PANE CLOSE (Alt + Shift + H) #####

bind -n M-U run-shell '
  current_window="$(tmux display-message -p "##{window_id}")"
  help_pane="$(tmux show-options -w -v -q -t "$current_window" @help_pane)"

  [ -z "$help_pane" ] && exit 0

  if tmux list-panes -a -F "##{pane_id}" | grep -qx "$help_pane"; then
    tmux kill-pane -t "$help_pane"
  fi

  tmux set-option -w -u -t "$current_window" @help_pane
'


##### CLEAN UP IF HELP PANE DIES MANUALLY #####

set-hook -g pane-died "run-shell '
  dead_pane=\"#{pane_id}\"
  dead_window=\"#{window_id}\"
  stored_help=\"\$(tmux show-options -w -v -q -t \"$dead_window\" @help_pane)\"

  if [ -n \"\$stored_help\" ] && [ \"\$dead_pane\" = \"\$stored_help\" ]; then
    tmux set-option -w -u -t \"$dead_window\" @help_pane
  fi
'"


##### =======================================================
##### PANE NAVIGATION (Alt + WASD)
##### =======================================================

bind -n M-w select-pane -U
bind -n M-a select-pane -L
bind -n M-s select-pane -D
bind -n M-d select-pane -R

bind -n M-Space last-pane


##### =======================================================
##### PANE RESIZING (Alt + Shift + WASD)
##### =======================================================

bind -n M-W resize-pane -U 5
bind -n M-A resize-pane -L 5
bind -n M-S resize-pane -D 5
bind -n M-D resize-pane -R 5


##### =======================================================
##### PANE STRUCTURE / LIFECYCLE
##### =======================================================

# Split panes (no conflicts)
# bind -n M-f split-window -v
# bind -n M-g split-window -h

# Promote pane ? new window
bind -n M-p break-pane

# Join pane into another window (interactive)
bind -n M-o choose-tree -Zw "join-pane -t '%%'"

unbind -n M-o
bind -n M-o display-menu -T "Join pane as..." \
  "Horizontal (left/right)" h { choose-tree -Zw { join-pane -h -t "%%" } } \
  "Vertical (top/bottom)"  v { choose-tree -Zw { join-pane -v -t "%%" } }

# Zoom pane
bind -n M-z resize-pane -Z

# Kill pane
bind -n M-x kill-pane


bind -n M-F if-shell -F '#{==:#{window_panes},2}' \
  'select-layout even-vertical' \
  'display-message "Re-orient works only on 2-pane windows"'

bind -n M-G if-shell -F '#{==:#{window_panes},2}' \
  'select-layout even-horizontal' \
  'display-message "Re-orient works only on 2-pane windows"'

##### =======================================================
##### WINDOW NAVIGATION / LIFECYCLE
##### =======================================================

# Navigate windows
bind -n M-q previous-window
bind -n M-e next-window

# Create new window
bind -n M-r new-window

# Kill current window (confirm)
bind -n M-& confirm-before -p "Kill current window? (y/n)" kill-window

# Rename window (intentional: prefix-based)
bind r command-prompt "rename-window '%%'"

##### =======================================================
##### DIRECT WINDOW SELECTION (Alt + 1..9) #####
##### =======================================================

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

##### =======================================================
##### WINDOW AUTO-RENAME FROM PANE TITLE (ZSH-DRIVEN) #####
##### =======================================================

# Let tmux control names, not application-driven renames
setw -g allow-rename off

# Rename window from the pane title supplied by zsh
setw -g automatic-rename off
# setw -g automatic-rename-format "#{pane_title}"

# Optional but recommended: start new windows/splits in the current pane's directory
bind -n M-R new-window -c "#{pane_current_path}"
bind -n M-f split-window -v -c "#{pane_current_path}"
bind -n M-g split-window -h -c "#{pane_current_path}"

##### =======================================================
##### SESSION NAVIGATION
##### =======================================================

# List sessions (focused view)
bind -n M-T choose-tree -Zs

# Previous / next session
bind -n M-Q switch-client -p
bind -n M-E switch-client -n

# Create new session (prompt for name)
bind -n M-t command-prompt -p "New session name:" "new-session -s '%%'"


##### =======================================================
##### SESSION DELETION (SAFE FALLBACK)
##### =======================================================

# Kill current session, switch safely if possible
bind -n M-X confirm-before -p "Kill current session? (y/n)" \
  "run-shell ' \
    current=\"$(tmux display-message -p \"#{session_name}\")\"; \
    if tmux has-session -t default 2>/dev/null && [ \"$current\" != \"default\" ]; then \
        tmux switch-client -t default; \
        tmux kill-session -t \"$current\"; \
    else \
        tmux switch-client -n 2>/dev/null || true; \
        tmux kill-session -t \"$current\"; \
    fi \
  '"


##### =======================================================
##### COPY MODE & CLIPBOARD
##### =======================================================

# Enter copy mode
bind -n M-c copy-mode

# Paste latest buffer
bind -n M-v paste-buffer

# Clipboard history
bind -n M-b list-buffers
bind -T buffer Enter paste-buffer -b %%
bind -T buffer d delete-buffer -b %%
bind -T buffer Escape send-keys Escape

# Vim-like selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi q send -X cancel


##### AUTO-CREATE DEFAULT SESSION #####

set-hook -g client-attached '
  if-shell "tmux list-sessions >/dev/null 2>&1" "" "tmux new-session -d -s default"
'

